<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | DermaCare AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #FDFCF8 0%, #F5F0E8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 30px;
            padding: 3rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
        }
        h2 { font-size: 1.8rem; margin-bottom: 0.5rem; color: #1A3B35; }
        p { color: #8A7E6E; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: #1A3B35; }
        .form-group input { width: 100%; padding: 1rem; border: 1px solid #E2E8F0; border-radius: 12px; font-size: 0.9rem; }
        .form-group input:focus { outline: none; border-color: #C6A43B; box-shadow: 0 0 0 3px rgba(198,164,59,0.1); }
        .btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, #1A3B35 0%, #C6A43B 100%); color: white; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; font-size: 1rem; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(198,164,59,0.3); }
        .error-message { background: #FEE2E2; color: #DC2626; padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; text-align: center; }
        .success-message { background: #D1FAE5; color: #065F46; padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; text-align: center; }
        .back-link { display: block; text-align: center; margin-top: 1.5rem; color: #8A7E6E; text-decoration: none; }
        .back-link:hover { color: #C6A43B; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Forgot Password</h2>
        <p>Enter your email to retrieve your password</p>

        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}

        {% if found %}
        <div class="success-message">Your password is: <strong>{{ password }}</strong></div>
        {% endif %}

        {% if found is none or not found %}
        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter your registered email" required>
            </div>
            <button type="submit" class="btn">Retrieve Password →</button>
        </form>
        {% endif %}

        <a href="{{ url_for('login') }}" class="back-link">← Back to Login</a>
    </div>
</body>
</html>
